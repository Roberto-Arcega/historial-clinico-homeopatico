<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Clínica Homeopática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Historia Clínica Homeopática</h1>
            <div class="fecha-actual" id="fechaActual"></div>
        </div>

        <!-- SECCIÓN DE BÚSQUEDA -->
        <div class="busqueda-container">
            <div class="busqueda-header">
                <h2>🔍 Buscar Paciente Existente</h2>
                <button type="button" onclick="toggleBuscador()" class="btn-toggle">
                    <span id="buscadorToggle">Mostrar Buscador</span>
                </button>
            </div>
            
            <div id="buscadorSection" class="buscador-section" style="display: none;">
                <div class="busqueda-form">
                    <div class="campo-busqueda">
                        <label for="buscarNombre">Buscar por nombre:</label>
                        <input type="text" id="buscarNombre" placeholder="Escriba el nombre..." onkeyup="buscarEnTiempoReal(this.value, 'nombre')">
                    </div>
                    
                    <div class="campo-busqueda">
                        <label for="buscarApellido">Buscar por apellido:</label>
                        <input type="text" id="buscarApellido" placeholder="Escriba el apellido..." onkeyup="buscarEnTiempoReal(this.value, 'apellido')">
                    </div>
                    
                    <button type="button" onclick="limpiarBusqueda()" class="btn-secondary">Limpiar</button>
                </div>

                <!-- RESULTADOS DE BÚSQUEDA -->
                <div id="resultadosBusqueda" class="resultados-container"></div>
            </div>
        </div>
        
        <div class="form-container">
            <form id="historialForm">


                <!-- SECCIÓN 1: DATOS BÁSICOS -->


                <section class="seccion collapsed">
                    <div class="seccion-header" onclick="toggleSeccion(this)">
                        <h2>Datos Básicos del Paciente</h2>
                        <div class="seccion-controles">
                            <button type="button" onclick="limpiarSeccionRapida(0)" class="btn-limpiar" title="Limpiar esta sección">🗑️</button>
                            <span class="seccion-toggle">▼</span>
                        </div>
                    </div>
                    <div class="seccion-content">
                        <!-- NOMBRE Y APELLIDO -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label for="nombre">Nombre(s):</label>
                                <input type="text" id="nombre" name="nombre" required>
                            </div>
                            <div class="campo-mitad">
                                <label for="apellido">Apellido(s):</label>
                                <input type="text" id="apellido" name="apellido" required>
                            </div>
                        </div>
                    
                        <div class="campo">
                            <label for="telefono">Teléfono:</label>
                            <input type="tel" id="telefono" name="telefono" required>
                        </div>
                        <!-- RECOMENDACIÓN -->
                        <div class="campo">
                            <label>¿Fue recomendado por alguien?</label>
                            <div class="radio-group">
                                <label><input type="radio" name="fueRecomendado" value="No" onchange="toggleRecomendacion()" required> No</label>
                                <label><input type="radio" name="fueRecomendado" value="Si" onchange="toggleRecomendacion()" required> Sí</label>
                            </div>
                        </div>

                        <div id="datosRecomendacion" style="display: none;">
                            <div class="campo">
                                <label for="nombreRecomendador">Nombre de quien lo recomendó:</label>
                                <input type="text" id="nombreRecomendador" name="nombreRecomendador">
                            </div>
                        </div>

                        <!-- LUGAR DE NACIMIENTO -->
                        <div class="campo">
                            <label for="lugarNacimiento">Lugar de nacimiento:</label>
                            <input type="text" id="lugarNacimiento" name="lugarNacimiento" placeholder="Ciudad, País">
                        </div>
                        <!-- EDAD Y SEXO -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label for="edad">Edad:</label>
                                <input type="number" id="edad" name="edad" min="0" max="120" required>
                            </div>
                            <div class="campo-mitad">
                                <label>Sexo:</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="sexo" value="Masculino" onchange="togglePreguntasMenstruacion()" required> Masculino</label>
                                    <label><input type="radio" name="sexo" value="Femenino" onchange="togglePreguntasMenstruacion()" required> Femenino</label>
                                </div>
                            </div>
                    
                         <!-- OCUPACIÓN Y ESTADO CIVIL -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label for="ocupacion">Ocupación:</label>
                                <select id="ocupacion" name="ocupacion" onchange="toggleOcupacionEspecifica()">
                                    <option value="">Seleccionar</option>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Empleado">Empleado</option>
                                    <option value="Profesionista">Profesionista</option>
                                    <option value="Comerciante">Comerciante</option>
                                    <option value="Ama de casa">Ama de casa</option>
                                    <option value="Jubilado">Jubilado</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>
                            <div class="campo-mitad">
                                <label for="estadoCivil">Estado Civil:</label>
                                <select id="estadoCivil" name="estadoCivil" onchange="toggleDatosConyuge()" required>
                                    <option value="">Seleccionar</option>
                                    <option value="Soltero">Soltero</option>
                                    <option value="Casado">Casado</option>
                                    <option value="Divorciado">Divorciado</option>
                                    <option value="Separado">Separado</option>
                                    <option value="Viudo/a">Viudo/a</option>
                                </select>
                            </div>
                        </div>

                        <!-- CAMPOS ESPECÍFICOS DE OCUPACIÓN -->
                        <div class="campo" id="detalleEstudianteContainer" style="display: none;">
                            <label for="queEstudia">¿Qué es lo que estudia?</label>
                            <input type="text" id="queEstudia" name="queEstudia" placeholder="Ej: Medicina, Ingeniería, Preparatoria...">
                        </div>

                        <div class="campo" id="detalleTrabajadorContainer" style="display: none;">
                            <label for="cualPuesto">¿Cuál es el puesto?</label>
                            <input type="text" id="cualPuesto" name="cualPuesto" placeholder="Ej: Gerente, Secretaria, Técnico...">
                        </div>

                        <div class="campo" id="detalleComerciante" style="display: none;">
                            <label for="queVende">¿Qué vende?</label>
                            <input type="text" id="queVende" name="queVende" placeholder="Ej: Ropa, Comida, Electrónicos...">
                        </div>

                        <!-- CAMPO OCUPACIÓN OTRO (mantener existente) -->
                        <div class="campo" id="ocupacionOtraContainer" style="display: none;">
                            <label for="ocupacionOtra">Especificar ocupación:</label>
                            <input type="text" id="ocupacionOtra" name="ocupacionOtra" placeholder="Escriba su ocupación">
                        </div>
                    
                        <!-- REEMPLAZAR el div datosConyuge actual con esta versión completa -->
                        <div id="datosConyuge" style="display: none;">
                            <!-- Para casados -->
                            <div id="datosCasado" style="display: none;">
                                <div class="campo-doble">
                                    <div class="campo-mitad">
                                        <label for="nombreConyuge">Nombre del cónyuge:</label>
                                        <input type="text" id="nombreConyuge" name="nombreConyuge">
                                    </div>
                                    <div class="campo-mitad">
                                        <label for="edadConyuge">Edad del cónyuge:</label>
                                        <input type="number" id="edadConyuge" name="edadConyuge" min="0" max="120">
                                    </div>
                                </div>
                            </div>

                            <!-- Para divorciados/separados -->
                            <div id="datosExConyuge" style="display: none;">
                                <div class="campo">
                                    <label>¿Su ex-pareja está vivo/a?</label>
                                    <div class="radio-group-inline">
                                        <label><input type="radio" name="estadoExConyuge" value="Vivo" onchange="toggleExConyugeVivo()"> Vivo</label>
                                        <label><input type="radio" name="estadoExConyuge" value="Muerto" onchange="toggleExConyugeVivo()"> Muerto</label>
                                    </div>
                                </div>
                                
                                <div id="exConyugeVivo" style="display: none;">
                                    <div class="campo">
                                        <label>¿Vive actualmente con su ex-pareja?</label>
                                        <div class="radio-group-inline">
                                            <label><input type="radio" name="viveConExConyuge" value="Si"> Sí</label>
                                            <label><input type="radio" name="viveConExConyuge" value="No"> No</label>
                                        </div>
                                    </div>
                                </div>
                                
                                <div id="exConyugeMuerto" style="display: none;">
                                    <div class="campo">
                                        <label for="causaMuerteExConyuge">Causa de muerte de la ex-pareja:</label>
                                        <input type="text" id="causaMuerteExConyuge" name="causaMuerteExConyuge" placeholder="Especificar causa de muerte">
                                    </div>
                                </div>
                            </div>

                            <!-- Para viudos -->
                            <div id="datosViudo" style="display: none;">
                                <div class="campo">
                                    <label for="causaMuerteConyugue">Causa de muerte del cónyuge:</label>
                                    <input type="text" id="causaMuerteConyugue" name="causaMuerteConyugue" placeholder="Especificar causa de muerte">
                                </div>
                            </div>
                        </div>
                </section>
                <!-- SECCION 2 REEMPLAZAR la sección familiar con estas mejoras -->
                <section class="seccion collapsed">
                    <div class="seccion-header" onclick="toggleSeccion(this)">
                        <h2>Información Familiar</h2>
                        <div class="seccion-controles">
                            <button type="button" onclick="limpiarSeccionRapida(1)" class="btn-limpiar" title="Limpiar esta sección">🗑️</button>
                            <span class="seccion-toggle">▼</span>
                        </div>
                    </div>
                    <div class="seccion-content">
                        <!-- DATOS DEL PADRE Y MADRE -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label>Padre:</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="estadoPadre" value="Vivo" onchange="toggleMuertePadre()" required> Vivo</label>
                                    <label><input type="radio" name="estadoPadre" value="Muerto" onchange="toggleMuertePadre()" required> Muerto</label>
                                </div>
                            </div>
                            <div class="campo-mitad">
                                <label>Madre:</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="estadoMadre" value="Vivo" onchange="toggleMuerteMadre()" required> Vivo</label>
                                    <label><input type="radio" name="estadoMadre" value="Muerto" onchange="toggleMuerteMadre()" required> Muerto</label>
                                </div>
                            </div>
                        </div>

                        <!-- CAUSAS DE MUERTE PADRES -->
                        <div id="causaMuertePadre" style="display: none;">
                            <div class="campo">
                                <label for="causaMuertePadreTexto">Causa de muerte del padre:</label>
                                <input type="text" id="causaMuertePadreTexto" name="causaMuertePadreTexto" placeholder="Especificar causa de muerte">
                            </div>
                        </div>

                        <div id="causaMuerteMadre" style="display: none;">
                            <div class="campo">
                                <label for="causaMuerteMadreTexto">Causa de muerte de la madre:</label>
                                <input type="text" id="causaMuerteMadreTexto" name="causaMuerteMadreTexto" placeholder="Especificar causa de muerte">
                            </div>
                        </div>

                        <!-- CONVIVENCIA CON PADRES -->
                        <div id="convivenciaPadres" style="display: none;">
                            <div class="campo">
                                <label>¿Vive actualmente con alguno de sus padres?</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="viveConPadres" value="Si"> Sí</label>
                                    <label><input type="radio" name="viveConPadres" value="No"> No</label>
                                </div>
                            </div>
                        </div>

                        <!-- HERMANOS (mantener igual pero agregar función muerte) -->
                        <div class="campo">
                            <div class="pregunta-inline">
                                <label>¿Cuántos hermanos tiene?</label>
                                <select id="numeroHermanos" name="numeroHermanos" onchange="generarHermanosNuevo()" class="select-cantidad">
                                    <option value="">-</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10+</option>
                                </select>
                            </div>
                        </div>
                        <div id="hermanosContainer"></div>

                        <!-- HIJOS -->
                        <div class="campo">
                            <div class="pregunta-inline">
                                <label>¿Cuántos hijos tiene?</label>
                                <select id="numeroHijos" name="numeroHijos" onchange="generarHijosNuevo()" class="select-cantidad">
                                    <option value="">-</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10+</option>
                                </select>
                            </div>
                        </div>
                        <div id="hijosContainer"></div>

                        <!-- PREGUNTA ESPECÍFICA PARA MUJERES -->
                        <div id="preguntaAbortos" style="display: none;">
                            <div class="campo">
                                <label>¿Ha tenido abortos?</label>
                                <div class="radio-group">
                                    <label><input type="radio" name="haTenickoAbortos" value="No" required> No</label>
                                    <label><input type="radio" name="haTenickoAbortos" value="Si" required> Sí</label>
                                </div>
                            </div>
                        </div>

                        <!-- CONVIVENCIA CON HIJOS -->
                        <div id="convivenciaHijos" style="display: none;">
                            <div class="campo">
                                <label>¿Vive actualmente con alguno de sus hijos?</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="viveConHijos" value="Si"> Sí</label>
                                    <label><input type="radio" name="viveConHijos" value="No"> No</label>
                                </div>
                            </div>
                        </div>

                        <!-- NIETOS -->
                        <div class="campo">
                            <div class="pregunta-inline">
                                <label>¿Cuántos nietos tiene?</label>
                                <select id="cantidadNietos" name="cantidadNietos" onchange="generarNietos()" class="select-cantidad">
                                    <option value="">-</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10+</option>
                                </select>
                            </div>
                        </div>
                        <div id="nietosContainer"></div>

                        <!-- ANTECEDENTES FAMILIARES -->
                        <div class="campo">
                            <label for="antecedentesFamiliares">Antecedentes familiares hereditarios:</label>
                            <textarea id="antecedentesFamiliares" name="antecedentesFamiliares" placeholder="Ej: Diabetes, hipertensión, cáncer, problemas cardíacos, etc."></textarea>
                        </div>
                    </div>
                </section>


                <!-- SECCIÓN 3: HÁBITOS Y ESTILO DE VIDA -->
                <section class="seccion collapsed">
                    <div class="seccion-header" onclick="toggleSeccion(this)">
                        <h2>HÁBITOS Y ESTILO DE VIDA</h2>
                        <div class="seccion-controles">
                            <button type="button" onclick="limpiarSeccionRapida(2)" class="btn-limpiar" title="Limpiar esta sección">🗑️</button>
                            <span class="seccion-toggle">▼</span>
                        </div>
                    </div>
                    <div class="seccion-content">
                        
                        <!-- 1. Comida Dulce Preferida -->
                        <div class="pregunta-fila">
                            <label>¿Cuál es tu comida dulce preferida?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="comida_dulce" value="helado" id="dulce_helado" onchange="manejarComidaDulce()">
                                <label for="dulce_helado">Helado</label>
                                
                                <input type="radio" name="comida_dulce" value="chocolate" id="dulce_chocolate" onchange="manejarComidaDulce()">
                                <label for="dulce_chocolate">Chocolate</label>
                                
                                <input type="radio" name="comida_dulce" value="pan" id="dulce_pan" onchange="manejarComidaDulce()">
                                <label for="dulce_pan">Pan/Postres</label>
                                
                                <input type="radio" name="comida_dulce" value="otros" id="dulce_otros" onchange="manejarComidaDulce()">
                                <label for="dulce_otros">Otros</label>
                                
                                <div id="otros-dulce-container" style="display: none; margin-top: 10px;">
                                    <input type="text" id="otros_dulce_texto" placeholder="Especifica tu comida dulce preferida">
                                </div>
                            </div>
                        </div>

                        <!-- 2. Comida Salada Preferida -->
                        <div class="pregunta-fila">
                            <label>¿Cuál es tu comida salada preferida?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="comida_salada" value="pollo" id="salada_pollo" onchange="toggleOtrosSalada()">
                                <label for="salada_pollo">Pollo</label>
                                
                                <input type="radio" name="comida_salada" value="pescado" id="salada_pescado" onchange="toggleOtrosSalada()">
                                <label for="salada_pescado">Pescado</label>
                                
                                <input type="radio" name="comida_salada" value="carne" id="salada_carne" onchange="toggleOtrosSalada()">
                                <label for="salada_carne">Carne</label>
                                
                                <input type="radio" name="comida_salada" value="caldos" id="salada_caldos" onchange="toggleOtrosSalada()">
                                <label for="salada_caldos">Caldos/Sopas</label>
                                
                                <input type="radio" name="comida_salada" value="otros" id="salada_otros" onchange="toggleOtrosSalada()">
                                <label for="salada_otros">Otros</label>
                                
                                <div id="otros-salada-container" style="display: none; margin-top: 10px;">
                                    <input type="text" id="otros_salada_texto" placeholder="Especifica tu comida salada preferida">
                                </div>
                            </div>
                        </div>

                        <!-- 3. Litros de Agua -->
                        <div class="pregunta-fila">
                            <label>¿Cuántos litros de agua tomas al día?</label>
                            <div class="respuesta-container">
                                <select name="litros_agua" id="litros_agua">
                                    <option value="">Selecciona...</option>
                                    <option value="1">1 litro</option>
                                    <option value="2">2 litros</option>
                                    <option value="3">3 litros</option>
                                    <option value="4">4 litros</option>
                                    <option value="5">5 litros</option>
                                    <option value="5+">Más de 5 litros</option>
                                </select>
                            </div>
                        </div>

                        <!-- 4. Sal Extra -->
                        <div class="pregunta-fila">
                            <label>¿Le agregas sal extra a tus alimentos?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="sal_extra" value="si" id="sal_si">
                                <label for="sal_si">Sí</label>
                                
                                <input type="radio" name="sal_extra" value="no" id="sal_no">
                                <label for="sal_no">No</label>
                            </div>
                        </div>

                        <!-- 5. Ejercicio -->
                        <div class="pregunta-fila">
                            <label>¿Realizas ejercicio regularmente?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="ejercicio" value="si" id="ejercicio_si" onchange="toggleEjercicio()">
                                <label for="ejercicio_si">Sí</label>
                                
                                <input type="radio" name="ejercicio" value="no" id="ejercicio_no" onchange="toggleEjercicio()">
                                <label for="ejercicio_no">No</label>
                                
                                <div id="ejercicio-frecuencia-container" style="display: none; margin-top: 10px;">
                                    <label>¿Con qué frecuencia?</label>
                                    <select name="ejercicio_frecuencia" id="ejercicio_frecuencia">
                                        <option value="">Selecciona...</option>
                                        <option value="diario">Diario</option>
                                        <option value="3-4_semana">3-4 veces por semana</option>
                                        <option value="1-2_semana">1-2 veces por semana</option>
                                        <option value="ocasional">Ocasionalmente</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- REEMPLAZAR: ¿Tiendes a ser Caluroso o Friolento? -->
                        <div class="pregunta-fila">
                            <label>¿Tiendes a ser Caluroso o Friolento?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="temperatura_corporal" value="caluroso" id="temp_caluroso">
                                <label for="temp_caluroso">Caluroso</label>
                                
                                <input type="radio" name="temperatura_corporal" value="friolento" id="temp_friolento">
                                <label for="temp_friolento">Friolento</label>
                            </div>
                        </div>

                        <!-- REEMPLAZAR: ¿Qué clima prefieres? -->
                        <div class="pregunta-fila">
                            <label>¿Qué clima prefieres?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="clima_preferido" value="calido" id="clima_calido">
                                <label for="clima_calido">Cálido</label>
                                
                                <input type="radio" name="clima_preferido" value="frio" id="clima_frio">
                                <label for="clima_frio">Frío</label>
                            </div>
                        </div>

                        <!-- 7. Problemas Intestino (COMPLEJO) -->
                        <div class="pregunta-fila">
                            <label>¿Tienes problemas intestinales?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="problemas_intestino" value="si" id="intestino_si" onchange="toggleProblemasIntestino()">
                                <label for="intestino_si">Sí</label>
                                
                                <input type="radio" name="problemas_intestino" value="no" id="intestino_no" onchange="toggleProblemasIntestino()">
                                <label for="intestino_no">No</label>
                                
                                <div id="problemas-intestino-detalle" style="display: none; margin-top: 15px;">
                                    <!-- Inflamación -->
                                    <div class="sub-pregunta">
                                        <label>¿Inflamación intestinal?</label>
                                        <input type="radio" name="inflamacion" value="si" id="inflamacion_si" onchange="toggleInflamacion()">
                                        <label for="inflamacion_si">Sí</label>
                                        
                                        <input type="radio" name="inflamacion" value="no" id="inflamacion_no" onchange="toggleInflamacion()">
                                        <label for="inflamacion_no">No</label>
                                        
                                        <div id="inflamacion-horario" style="display: none; margin-top: 10px;">
                                            <input type="text" id="inflamacion_horario_texto" placeholder="¿En qué horario es más frecuente?">
                                        </div>
                                    </div>
                                    
                                    <!-- Gases -->
                                    <div class="sub-pregunta">
                                        <label>¿Gases intestinales?</label>
                                        <input type="radio" name="gases" value="si" id="gases_si" onchange="toggleGases()">
                                        <label for="gases_si">Sí</label>
                                        
                                        <input type="radio" name="gases" value="no" id="gases_no" onchange="toggleGases()">
                                        <label for="gases_no">No</label>
                                        
                                        <div id="gases-horario" style="display: none; margin-top: 10px;">
                                            <input type="text" id="gases_horario_texto" placeholder="¿En qué horario es más frecuente?">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 8. Estreñimiento/Diarrea -->
                        <div class="pregunta-fila">
                            <label>¿Sufres de estreñimiento o diarrea?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="estrenimiento_diarrea" value="estrenimiento" id="estrenimiento" onchange="toggleFrecuenciaIntestinal()">
                                <label for="estrenimiento">Estreñimiento</label>
                                
                                <input type="radio" name="estrenimiento_diarrea" value="diarrea" id="diarrea" onchange="toggleFrecuenciaIntestinal()">
                                <label for="diarrea">Diarrea</label>
                                
                                <input type="radio" name="estrenimiento_diarrea" value="ambos" id="ambos" onchange="toggleFrecuenciaIntestinal()">
                                <label for="ambos">Ambos</label>
                                
                                <input type="radio" name="estrenimiento_diarrea" value="ninguno" id="ninguno" onchange="toggleFrecuenciaIntestinal()">
                                <label for="ninguno">Ninguno</label>
                                
                                <div id="frecuencia-intestinal-container" style="display: none; margin-top: 10px;">
                                    <label>¿Con qué frecuencia?</label>
                                    <select name="frecuencia_intestinal" id="frecuencia_intestinal">
                                        <option value="">Selecciona...</option>
                                        <option value="diario">Diario</option>
                                        <option value="semanal">Semanal</option>
                                        <option value="mensual">Mensual</option>
                                        <option value="ocasional">Ocasional</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 9. Hemorroides -->
                        <div class="pregunta-fila">
                            <label>¿Padeces hemorroides?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="hemorroides" value="si" id="hemorroides_si">
                                <label for="hemorroides_si">Sí</label>
                                
                                <input type="radio" name="hemorroides" value="no" id="hemorroides_no">
                                <label for="hemorroides_no">No</label>
                            </div>
                        </div>

                        <!-- 10. Vida Sexual -->
                        <div class="pregunta-fila">
                            <label>¿Tienes vida sexual activa?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="vida_sexual" value="si" id="sexual_si" onchange="toggleVidaSexual()">
                                <label for="sexual_si">Sí</label>
                                
                                <input type="radio" name="vida_sexual" value="no" id="sexual_no" onchange="toggleVidaSexual()">
                                <label for="sexual_no">No</label>
                                
                                <div id="frecuencia-sexual-container" style="display: none; margin-top: 10px;">
                                    <label>¿Con qué frecuencia?</label>
                                    <select name="frecuencia_sexual" id="frecuencia_sexual">
                                        <option value="">Selecciona...</option>
                                        <option value="diaria">Diaria</option>
                                        <option value="semanal">Semanal</option>
                                        <option value="quincenal">Quincenal</option>
                                        <option value="mensual">Mensual</option>
                                        <option value="ocasional">Ocasional</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 11. Transpiración -->
                        <div class="pregunta-fila">
                            <label>¿Tienes transpiración constante?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="transpiracion" value="si" id="transpiracion_si" onchange="toggleTranspiracion()">
                                <label for="transpiracion_si">Sí</label>
                                
                                <input type="radio" name="transpiracion" value="no" id="transpiracion_no" onchange="toggleTranspiracion()">
                                <label for="transpiracion_no">No</label>
                                
                                <div id="olor-fuerte-container" style="display: none; margin-top: 10px;">
                                    <label>¿Con olor fuerte?</label>
                                    <input type="radio" name="olor_fuerte" value="si" id="olor_si">
                                    <label for="olor_si">Sí</label>
                                    
                                    <input type="radio" name="olor_fuerte" value="no" id="olor_no">
                                    <label for="olor_no">No</label>
                                </div>
                            </div>
                        </div>

                        <!-- 12. Aguantar el Sol -->
                        <div class="pregunta-fila">
                            <label>¿Aguantas el sol directamente?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="aguanta_sol" value="si" id="aguanta_sol_si" onchange="toggleAguantarSol()">
                                <label for="aguanta_sol_si">Sí</label>
                                
                                <input type="radio" name="aguanta_sol" value="no" id="aguanta_sol_no" onchange="toggleAguantarSol()">
                                <label for="aguanta_sol_no">No</label>
                                
                                <div id="porque-no-sol-container" style="display: none; margin-top: 15px;">
                                    <label>¿Por qué?</label>
                                    <textarea name="porque_no_sol" id="porque_no_sol" placeholder="Explica por qué no aguantas el sol directamente..." rows="3"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- 13. Menstruación -->
                        <div class="pregunta-fila" id="colicos-container">
                            <label>¿Todavía menstrúas?</label>
                            <div class="respuesta-container">
                                <input type="radio" name="menstrua" value="si" id="menstrua_si" onchange="toggleMenstruacion()">
                                <label for="menstrua_si">Sí</label>
                                
                                <input type="radio" name="menstrua" value="no" id="menstrua_no" onchange="toggleMenstruacion()">
                                <label for="menstrua_no">No</label>
                                
                                <!-- SI MENSTRÚA: Pregunta sobre cólicos -->
                                <div id="colicos-actuales-container" style="display: none; margin-top: 15px;">
                                    <label>¿Sufres de cólicos?</label>
                                    <div style="margin-top: 10px;">
                                        <input type="radio" name="colicos_actuales" value="si" id="colicos_actuales_si" onchange="toggleColicosActuales()">
                                        <label for="colicos_actuales_si">Sí</label>
                                        
                                        <input type="radio" name="colicos_actuales" value="no" id="colicos_actuales_no" onchange="toggleColicosActuales()">
                                        <label for="colicos_actuales_no">No</label>
                                    </div>
                                    
                                    <!-- SI TIENE CÓLICOS: Como es el dolor -->
                                    <div id="dolor-colicos-container" style="display: none; margin-top: 15px;">
                                        <label>¿Cómo es tu dolor?</label>
                                        <textarea name="dolor_colicos" id="dolor_colicos" placeholder="Describe cómo es tu dolor de cólicos..." rows="3" style="margin-top: 10px;"></textarea>
                                    </div>
                                    
                                    <!-- SI NO TIENE CÓLICOS: Edad que dejó de menstruar -->
                                    <div id="edad-sin-colicos-container" style="display: none; margin-top: 15px;">
                                        <label>¿A qué edad dejaste de menstruar?</label>
                                        <textarea name="edad_sin_colicos" id="edad_sin_colicos" placeholder="Ej: A los 45 años, hace 5 años aproximadamente, etc." rows="3" style="margin-top: 10px;"></textarea>
                                    </div>
                                </div>
                                
                                <!-- SI NO MENSTRÚA: Pregunta edad -->
                                <div id="edad-menopausia-container" style="display: none; margin-top: 15px;">
                                    <label>¿A qué edad dejaste de menstruar?</label>
                                    <textarea name="edad_menopausia" id="edad_menopausia" placeholder="Ej: A los 45 años, hace 5 años aproximadamente, etc." rows="3" style="margin-top: 10px;"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- 14. Patrón de Sueño -->
                        <div class="pregunta-fila">
                            <label>¿Cuál es tu patrón de sueño?</label>
                            <div class="respuesta-container">
                                <textarea name="patron_sueno" id="patron_sueno" placeholder="Ej: Me duermo a las 10pm y despierto a las 6am, tengo insomnio, duermo irregular por trabajo, etc." rows="3"></textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- SECCIÓN 4: PERFIL HOMEOPÁTICO -->
                <section class="seccion collapsed">
                    <div class="seccion-header" onclick="toggleSeccion(this)">
                        <h2>Perfil Homeopático</h2>
                        <div class="seccion-controles">
                            <button type="button" onclick="limpiarSeccionRapida(3)" class="btn-limpiar" title="Limpiar esta sección">🗑️</button>
                            <span class="seccion-toggle">▼</span>
                        </div>
                    </div>
                    <div class="seccion-content">
                        <!-- MOTIVO DE CONSULTA -->
                        <div class="campo">
                            <label for="motivoConsulta">Motivo principal de la consulta:</label>
                            <textarea id="motivoConsulta" name="motivoConsulta" placeholder="Describa el problema que lo trae a consulta..." required></textarea>
                        </div>
                    
                        <div class="campo">
                            <label for="tiempoEvolucion">¿Desde cuándo presenta este problema?</label>
                            <input type="text" id="tiempoEvolucion" name="tiempoEvolucion" placeholder="Ej: 3 meses, 1 año, desde la infancia...">
                        </div>
                    
                        <!-- CARÁCTER Y PERSONALIDAD -->
                        <div class="campo">
                            <label for="caracter">Describa su carácter/personalidad:</label>
                            <textarea id="caracter" name="caracter" placeholder="Ej: Tímido, extrovertido, irritable, tranquilo, ansioso, etc."></textarea>
                        </div>
                    
                        <!-- MIEDOS Y PREFERENCIAS ALIMENTARIAS -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label>¿Tiene miedos específicos o fobias?</label>
                                <div class="radio-group-inline">
                                    <label><input type="radio" name="tieneMiedos" value="No" onchange="toggleMiedos()" required> No</label>
                                    <label><input type="radio" name="tieneMiedos" value="Si" onchange="toggleMiedos()" required> Sí</label>
                                </div>
                            </div>
                        </div>
                    
                        <!-- DETALLES DE MIEDOS (si los tiene) -->
                        <div id="datosMiedos" style="display: none;">
                            <div class="campo">
                                <label for="listaMiedos">Describa sus miedos o fobias:</label>
                                <textarea id="listaMiedos" name="listaMiedos" placeholder="Ej: Miedo a la oscuridad, a las alturas, a los espacios cerrados, etc."></textarea>
                            </div>
                        </div>
                    
                        <!-- SÍNTOMAS FÍSICOS ACTUALES -->
                        <div class="campo">
                            <label for="sintomasFisicos">Síntomas físicos actuales (además del motivo principal):</label>
                            <textarea id="sintomasFisicos" name="sintomasFisicos" placeholder="Ej: Dolores de cabeza, problemas digestivos, cansancio, etc."></textarea>
                        </div>
                    

                    
                        <!-- ESTADO EMOCIONAL -->
                        <div class="campo">
                            <label for="estadoEmocional">Estado emocional actual:</label>
                            <textarea id="estadoEmocional" name="estadoEmocional" placeholder="Ej: Ansioso por trabajo, triste por pérdida, estresado, tranquilo, etc."></textarea>
                        </div>
                    
                        <!-- FACTORES AGRAVANTES Y MEJORANTES -->
                        <div class="campo-doble">
                            <div class="campo-mitad">
                                <label for="mejoraCon">Sus síntomas mejoran con:</label>
                                <textarea id="mejoraCon" name="mejoraCon" placeholder="Ej: Reposo, calor, frío, movimiento, compañía, etc."></textarea>
                            </div>
                            <div class="campo-mitad">
                                <label for="empeoraCon">Sus síntomas empeoran con:</label>
                                <textarea id="empeoraCon" name="empeoraCon" placeholder="Ej: Estrés, frío, calor, humedad, ruidos, etc."></textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Botones finales -->
                <div class="botones-finales">
                    <button type="submit" class="btn-primary">Guardar Historial</button>
                    <button type="button" onclick="limpiarTodoRapido()" class="btn-danger-small">
                        🗑️ Limpiar Todo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de confirmación personalizado -->
    <div id="modalExito" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span class="check-icon">✅</span>
                <h3>¡Historial Guardado!</h3>
            </div>
            <p>El historial clínico se ha guardado exitosamente en la base de datos.</p>
            <button onclick="cerrarModal()" class="btn-primary">Aceptar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
